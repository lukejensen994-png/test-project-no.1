<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cartoon Button Bomb</title>
  <link rel="stylesheet" href="bomb-page-v10.css">
</head>
<body>
  <main class="stage" aria-label="Cartoon countdown button test">
    <div class="bomb-scene">
      <div class="bomb" aria-label="Cartoon time bomb prop">
        <div class="bomb-body"></div>
        <div class="button-base">
          <button class="red-button" type="button" aria-label="Press red button"></button>
        </div>
        <div class="display-panel" aria-label="Countdown timer">
          <span class="display-screen" id="countdown-display" aria-live="polite">10</span>
        </div>
      </div>
      <p class="button-label">Press the button</p>
    </div>
  </main>
  <script src="bomb-countdown-v10.js"></script>
</body>
</html>
